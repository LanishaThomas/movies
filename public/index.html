<!DOCTYPE html>
<html>
<head>
  <title>Movie Recommender 🎬</title>

  <style>
    body {
      font-family: "Courier New", monospace;
      margin: 0;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 🎞️ Film grain overlay */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.15;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 850px;
      margin: auto;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    h1 {
      text-align: center;
      font-size: 2.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: flicker 2s infinite;
    }

    .card {
      background: #111;
      border: 1px solid #444;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .card:hover {
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    input, select {
      background: #000;
      color: #fff;
      border: 1px solid #555;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
    }

    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 10px 15px;
      margin-top: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #ccc;
      transform: scale(1.05);
    }

    .movie {
      border: 1px solid #555;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
      background: #0f0f0f;
      transition: 0.3s;
      position: relative;
    }

    .movie:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    /* 🎬 Old film flicker */
    @keyframes flicker {
      0% {opacity: 0.9;}
      50% {opacity: 1;}
      100% {opacity: 0.95;}
    }

    /* 🎞️ Scanlines */
    body::after {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 1;
    }

    .delete-btn {
      background: #fff;
      color: #000;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🎬 Movie Archive</h1>

  <!-- Add Movie -->
  <div class="card">
    <h3>Add Film</h3>
    <input id="title" placeholder="Title">
    <input id="genre" placeholder="Genre">
    <input id="rating" type="number" placeholder="Rating">
    <select id="recommended">
      <option value="true">Recommended</option>
      <option value="false">Not Recommended</option>
    </select>
    <button onclick="addMovie()">Add</button>
  </div>

  <!-- Filter -->
  <div class="card">
    <h3>Filter by Rating</h3>

    <select id="operator">
      <option value="eq">= Equal</option>
      <option value="gt">> Greater Than</option>
      <option value="lt">< Less Than</option>
    </select>

    <input id="filterRating" type="number" placeholder="Enter rating">

    <button onclick="getMovies()">Search</button>
  </div>

  <!-- Movies -->
  <div class="card">
    <h3>Film Collection</h3>
    <div id="movies"></div>
  </div>

</div>

<script>
async function getMovies() {
  const rating = document.getElementById("filterRating").value;
  const operator = document.getElementById("operator").value;

  let url = "/api/movies";

  if (rating) {
    url += `?rating=${rating}&operator=${operator}`;
  }

  const res = await fetch(url);
  const data = await res.json();

  const container = document.getElementById("movies");
  container.innerHTML = "";

  data.data.forEach(movie => {
    container.innerHTML += `
      <div class="movie">
        <b>${movie.title}</b> (${movie.genre})<br>
        Rating: ${movie.rating}<br>
        Recommended: ${movie.recommended}
        <br>
        <button class="delete-btn" onclick="deleteMovie('${movie.id}')">Delete</button>
      </div>
    `;
  });
}

async function addMovie() {
  const body = {
    title: document.getElementById("title").value,
    genre: document.getElementById("genre").value,
    rating: Number(document.getElementById("rating").value),
    recommended: document.getElementById("recommended").value === "true"
  };

  await fetch("/api/movies", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  getMovies();
}

async function deleteMovie(id) {
  await fetch(`/api/movies?id=${id}`, {
    method: "DELETE"
  });

  getMovies();
}

getMovies();
</script>

</body>
</html>
